version: '3.8'

services:
  # Infrastructure
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-saas_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  # Core Services
  orchestrator:
    build:
      context: ../../apps/orchestrator
      dockerfile: ../../deployments/docker/Dockerfile.orchestrator
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    env_file:
      - ../../apps/orchestrator/.env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_ADDR=redis:6379

  agent-engine:
    build:
      context: ../../apps/agent-engine
      dockerfile: ../../deployments/docker/Dockerfile.agent
    restart: always
    depends_on:
      - redis
    ports:
      - "8000:8000"
    env_file:
      - ../../apps/agent-engine/.env

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: ../../deployments/docker/Dockerfile.frontend
    restart: always
    depends_on:
      - orchestrator
    ports:
      - "3000:3000"
    env_file:
      - ../../apps/frontend/.env.local

volumes:
  pgdata:
