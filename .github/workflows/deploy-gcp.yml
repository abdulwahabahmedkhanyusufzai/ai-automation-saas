name: GCP Deployment (Cloud Run) 🚀

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Orchestrator
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/orchestrator:latest -f deployments/docker/Dockerfile.orchestrator apps/orchestrator
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/orchestrator:latest

      - name: Build and Push Agent Engine
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/agent-engine:latest -f deployments/docker/Dockerfile.agent apps/agent-engine
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/agent-engine:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy orchestrator --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/orchestrator:latest --platform managed --region us-central1 --allow-unauthenticated
          gcloud run deploy agent-engine --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/agent-engine:latest --platform managed --region us-central1 --allow-unauthenticated
