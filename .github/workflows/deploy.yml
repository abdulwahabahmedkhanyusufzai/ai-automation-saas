name: Cloud Deployment (Production) 🚀

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and Push Go Orchestrator
        uses: docker/build-push-action@v4
        with:
          context: apps/orchestrator
          file: deployments/docker/Dockerfile.orchestrator
          push: false # Set true once ECR/Hub configured

      - name: Build and Push Python Agent
        uses: docker/build-push-action@v4
        with:
          context: apps/agent-engine
          file: deployments/docker/Dockerfile.agent
          push: false

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: apps/frontend
          file: deployments/docker/Dockerfile.frontend
          push: false

      - name: Deploy to ECS (Terraform)
        run: |
          cd infra/terraform
          terraform init
          terraform plan -out=tfplan
          # terraform apply tfplan -auto-approve # Caution: Automated infrastructure!
