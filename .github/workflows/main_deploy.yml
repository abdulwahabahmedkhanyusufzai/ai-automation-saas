name: AI SaaS CD Pipeline

on:
  push:
    branches: [ master ]

permissions:
  id-token: write
  contents: read

# This pipeline is structured to run multiple logical processes in parallel
# so the GitHub Actions graph clearly shows separate steps for each build.
#
# The jobs run in parallel where possible, then a final deploy job runs once
# all build jobs have completed successfully.

jobs:
  build-orchestrator:
    name: Build & Push (Orchestrator)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build + Push Orchestrator image
        run: |
          TAG=$ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG
          docker build -t $TAG -f deployments/docker/Dockerfile.orchestrator .
          docker push $TAG

  build-agent-engine:
    name: Build & Push (Agent Engine)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build + Push Agent Engine image
        run: |
          TAG=$ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG
          docker build -t $TAG -f deployments/docker/Dockerfile.agent .
          docker push $TAG

  build-frontend:
    name: Build & Push (Frontend)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build + Push Frontend image
        run: |
          TAG=$ACR_LOGIN_SERVER/frontend:$IMAGE_TAG
          docker build \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GITHUB_CLIENT_ID }} \
            -t $TAG -f deployments/docker/Dockerfile.frontend apps/frontend
          docker push $TAG

  deploy-orchestrator:
    name: Deploy (Orchestrator)
    needs: build-orchestrator
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: ${{ secrets.AZURE_RG || 'rg-agentic-saas' }}
    steps:
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension is installed
        run: az extension add --name containerapp --upgrade --yes

      - name: Verify Orchestrator image exists
        run: |
          echo "Verifying orchestrator image tag exists in ACR..."
          az acr repository show-tags --name ${{ secrets.ACR_NAME }} --repository orchestrator --query "[?@=='$IMAGE_TAG']" -o tsv | grep -q "$IMAGE_TAG" || (echo "ERROR: orchestrator image tag $IMAGE_TAG not found in ACR" && exit 1)

      - name: Deploy Orchestrator to Azure Container Apps
        run: |
          az containerapp update -g $AZURE_RG -n ca-orchestrator --image $ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG

  deploy-agent-engine:
    name: Deploy (Agent Engine)
    needs: build-agent-engine
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: ${{ secrets.AZURE_RG || 'rg-agentic-saas' }}
    steps:
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension is installed
        run: az extension add --name containerapp --upgrade --yes

      - name: Verify Agent Engine image exists
        run: |
          echo "Verifying agent-engine image tag exists in ACR..."
          az acr repository show-tags --name ${{ secrets.ACR_NAME }} --repository agent-engine --query "[?@=='$IMAGE_TAG']" -o tsv | grep -q "$IMAGE_TAG" || (echo "ERROR: agent-engine image tag $IMAGE_TAG not found in ACR" && exit 1)

      - name: Deploy Agent Engine to Azure Container Apps
        run: |
          az containerapp update -g $AZURE_RG -n ca-agent-engine --image $ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG

  deploy-frontend:
    name: Deploy (Frontend)
    needs: build-frontend
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: ${{ secrets.AZURE_RG || 'rg-agentic-saas' }}
    steps:
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension is installed
        run: az extension add --name containerapp --upgrade --yes

      - name: Verify Frontend image exists
        run: |
          echo "Verifying frontend image tag exists in ACR..."
          az acr repository show-tags --name ${{ secrets.ACR_NAME }} --repository frontend --query "[?@=='$IMAGE_TAG']" -o tsv | grep -q "$IMAGE_TAG" || (echo "ERROR: frontend image tag $IMAGE_TAG not found in ACR" && exit 1)

      - name: Deploy Frontend to Azure Container Apps
        run: |
          az containerapp update -g $AZURE_RG -n ca-frontend --image $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG
