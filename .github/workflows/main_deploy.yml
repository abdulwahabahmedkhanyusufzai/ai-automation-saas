name: AI SaaS CD Pipeline

on:
  push:
    branches: [ master ]

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (Azure)
        working-directory: infra/terraform/azure
        run: |
          terraform init -input=false
          terraform apply -auto-approve

  build-and-push:
    needs: terraform
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: orchestrator
            context: .
            dockerfile: deployments/docker/Dockerfile.orchestrator
            image: orchestrator
          - service: agent-engine
            context: .
            dockerfile: deployments/docker/Dockerfile.agent
            image: agent-engine
          - service: frontend
            context: apps/frontend
            dockerfile: deployments/docker/Dockerfile.frontend
            image: frontend
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & Push
        run: |
          TAG=$ACR_LOGIN_SERVER/${{ matrix.image }}:$IMAGE_TAG
          docker build -t $TAG -f ${{ matrix.dockerfile }} ${{ matrix.context }}
          docker push $TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: ${{ secrets.AZURE_RG || 'rg-agentic-saas' }}
      AZURE_LOCATION: "East US"
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy Orchestrator to Azure Container Apps
        run: |
          az containerapp update -g $AZURE_RG -n ca-orchestrator --image $ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG

      - name: Deploy Agent Engine to Azure Container Apps
        run: |
          az containerapp update -g $AZURE_RG -n ca-agent-engine --image $ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG

      - name: Deploy Frontend to Azure Container Apps
        run: |
          az containerapp update -g $AZURE_RG -n ca-frontend --image $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG
