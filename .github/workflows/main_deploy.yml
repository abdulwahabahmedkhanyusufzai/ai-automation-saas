name: AI SaaS CD Pipeline

on:
  push:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  # BUILD JOBS (UNCHANGED)
  build-orchestrator:
    name: Build & Push (Orchestrator)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az acr login --name ${{ secrets.ACR_NAME }}
      - run: |
          TAG=$ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG
          docker build -t $TAG -f deployments/docker/Dockerfile.orchestrator .
          docker push $TAG

  build-agent-engine:
    name: Build & Push (Agent Engine)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: az acr login --name ${{ secrets.ACR_NAME }}
      - run: |
          TAG=$ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG
          docker build -t $TAG -f deployments/docker/Dockerfile.agent .
          docker push $TAG

  build-frontend:
    name: Build & Push (Frontend)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}
      - name: Build + Push Frontend image
        run: |
          TAG=$ACR_LOGIN_SERVER/frontend:$IMAGE_TAG
          docker build \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GITHUB_CLIENT_ID }} \
            -t $TAG -f deployments/docker/Dockerfile.frontend apps/frontend
          docker push $TAG

  # MIGRATION & DEPLOYMENT JOBS
  deploy-all-to-uae:
    name: Migrate & Deploy to UAE
    needs: [build-orchestrator, build-agent-engine, build-frontend]
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: ${{ secrets.AZURE_RG || 'rg-agentic-saas' }}
      ENV_NAME: 'managed-env-uae'
    steps:
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Cleanup Non-UAE Environments (Free Tier 1-Env Limit)
        run: |
          echo "Checking for old environments in other regions..."
          OLD_ENVS=$(az containerapp env list -g ${{ env.AZURE_RG }} --query "[?location!='uaenorth'].name" -o tsv)
          for env in $OLD_ENVS; do
            echo "Deleting old environment: $env to free up student quota..."
            az containerapp env delete -n $env -g ${{ env.AZURE_RG }} --yes
          done

      - name: Ensure UAE Environment exists
        run: |
          ENV_EXISTS=$(az containerapp env list -g ${{ env.AZURE_RG }} --query "[?name=='${{ env.ENV_NAME }}'].name" -o tsv)
          if [ -z "$ENV_EXISTS" ]; then
            echo "Creating ${{ env.ENV_NAME }} in uaenorth..."
            az containerapp env create --name ${{ env.ENV_NAME }} --resource-group ${{ env.AZURE_RG }} --location uaenorth
          fi

      - name: Deploy Orchestrator
        run: |
          APP_EXISTS=$(az containerapp list -g ${{ env.AZURE_RG }} --query "[?name=='ca-orchestrator'].name" -o tsv)
          if [ -z "$APP_EXISTS" ]; then
            az containerapp create -g ${{ env.AZURE_RG }} -n ca-orchestrator --environment ${{ env.ENV_NAME }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/orchestrator:${{ env.IMAGE_TAG }} --ingress external --target-port 8080
          else
            az containerapp update -g ${{ env.AZURE_RG }} -n ca-orchestrator --image ${{ env.ACR_LOGIN_SERVER }}/orchestrator:${{ env.IMAGE_TAG }}
          fi

      - name: Deploy Agent Engine
        run: |
          APP_EXISTS=$(az containerapp list -g ${{ env.AZURE_RG }} --query "[?name=='ca-agent-engine'].name" -o tsv)
          if [ -z "$APP_EXISTS" ]; then
            az containerapp create -g ${{ env.AZURE_RG }} -n ca-agent-engine --environment ${{ env.ENV_NAME }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/agent-engine:${{ env.IMAGE_TAG }} --ingress external --target-port 8000 \
              --cpu 1.0 --memory 2.0Gi
          else
            az containerapp update -g ${{ env.AZURE_RG }} -n ca-agent-engine --image ${{ env.ACR_LOGIN_SERVER }}/agent-engine:${{ env.IMAGE_TAG }}
          fi

      - name: Deploy Frontend
        run: |
          APP_EXISTS=$(az containerapp list -g ${{ env.AZURE_RG }} --query "[?name=='ca-frontend'].name" -o tsv)
          if [ -z "$APP_EXISTS" ]; then
            az containerapp create -g ${{ env.AZURE_RG }} -n ca-frontend --environment ${{ env.ENV_NAME }} \
              --image ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ env.IMAGE_TAG }} --ingress external --target-port 3000
          else
            az containerapp update -g ${{ env.AZURE_RG }} -n ca-frontend --image ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ env.IMAGE_TAG }}
          fi