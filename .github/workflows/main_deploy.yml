name: Azure CI/CD (OIDC)

on:
  push:
    branches: [ master ]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Test Connection
        run: |
          az account show
          az group list -o table

      - name: Validate ACR_NAME secret
        if: ${{ secrets.ACR_NAME == '' }}
        run: |
          echo "ERROR: GitHub secret ACR_NAME is not set."
          echo "Go to Settings → Secrets and add ACR_NAME with your ACR registry name."
          exit 1

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and Push Orchestrator
        run: |
          docker build -t $ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG -f deployments/docker/Dockerfile.orchestrator apps/orchestrator
          docker push $ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG

      - name: Build and Push Agent Engine
        run: |
          docker build -t $ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG -f deployments/docker/Dockerfile.agent apps/agent-engine
          docker push $ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG

      - name: Build and Push Frontend
        run: |
          docker build -t $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG -f deployments/docker/Dockerfile.frontend apps/frontend
          docker push $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG

      - name: Deploy Orchestrator to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RG }}
          containerAppEnvironment: cae-agentic-saas
          containerAppName: ca-orchestrator
          imageToDeploy: $ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG

      - name: Deploy Agent Engine to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RG }}
          containerAppEnvironment: cae-agentic-saas
          containerAppName: ca-agent-engine
          imageToDeploy: $ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG

      - name: Deploy Frontend to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ secrets.AZURE_RG }}
          containerAppEnvironment: cae-agentic-saas
          containerAppName: ca-frontend
          imageToDeploy: $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG
