name: AI SaaS CD Pipeline

on:
  push:
    branches: [ master ]

permissions:
  id-token: write
  contents: read

jobs:
  # Note: I am assuming your build jobs (build-orchestrator, etc.) 
  # are already defined earlier in the file.
  
  deploy-all-to-uae:
    name: Deploy to UAE
    needs: [build-orchestrator, build-agent-engine, build-frontend]
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: 'rg-agentic-saas'
      ENV_NAME: 'managed-env-uae'
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Ensure UAE Environment exists
        run: |
          # If the environment exists, this command returns 0; if not, it runs the create command.
          az containerapp env show -n ${{ env.ENV_NAME }} -g ${{ env.AZURE_RG }} || \
          az containerapp env create -n ${{ env.ENV_NAME }} -g ${{ env.AZURE_RG }} -l uaenorth

      - name: Deploy Orchestrator
        run: |
          az containerapp create -g ${{ env.AZURE_RG }} -n ca-orchestrator \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/orchestrator:${{ env.IMAGE_TAG }} \
            --ingress external --target-port 8080 --cpu 0.5 --memory 1.0Gi

      - name: Deploy Agent Engine
        run: |
          az containerapp create -g ${{ env.AZURE_RG }} -n ca-agent-engine \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/agent-engine:${{ env.IMAGE_TAG }} \
            --ingress external --target-port 8000 \
            --cpu 1.0 --memory 2.0Gi

      - name: Deploy Frontend
        run: |
          az containerapp create -g ${{ env.AZURE_RG }} -n ca-frontend \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ env.IMAGE_TAG }} \
            --ingress external --target-port 3000 --cpu 0.5 --memory 1.0Gi