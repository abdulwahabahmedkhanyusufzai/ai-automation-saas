name: AI SaaS CD Pipeline

on:
  push:
    branches: [ master ]

# Prevents multiple workflow runs from fighting over Azure resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  build-orchestrator:
    name: Build & Push (Orchestrator)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build + Push Orchestrator image
        run: |
          TAG=$ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG
          docker build -t $TAG -f deployments/docker/Dockerfile.orchestrator .
          docker push $TAG

  build-agent-engine:
    name: Build & Push (Agent Engine)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build + Push Agent Engine image
        run: |
          TAG=$ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG
          docker build -t $TAG -f deployments/docker/Dockerfile.agent .
          docker push $TAG

  build-frontend:
    name: Build & Push (Frontend)
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build + Push Frontend image
        run: |
          TAG=$ACR_LOGIN_SERVER/frontend:$IMAGE_TAG
          docker build \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GITHUB_CLIENT_ID }} \
            -t $TAG -f deployments/docker/Dockerfile.frontend apps/frontend
          docker push $TAG

  deploy-orchestrator:
    name: Deploy (Orchestrator)
    needs: build-orchestrator
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: ${{ secrets.AZURE_RG || 'rg-agentic-saas' }}
    steps:
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy Orchestrator to Azure Container Apps
        run: |
          az containerapp update -g $AZURE_RG -n ca-orchestrator --image $ACR_LOGIN_SERVER/orchestrator:$IMAGE_TAG

  deploy-agent-engine:
    name: Deploy (Agent Engine)
    needs: [deploy-orchestrator, build-agent-engine]
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: ${{ secrets.AZURE_RG || 'rg-agentic-saas' }}
    steps:
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Ensure UAE Environment exists
        run: |
          ENV_EXISTS=$(az containerapp env list -g $AZURE_RG --query "[?name=='managed-env-uae'].name" -o tsv)
          if [ -z "$ENV_EXISTS" ]; then
            echo "Creating managed-env-uae in uaenorth..."
            az containerapp env create --name managed-env-uae --resource-group $AZURE_RG --location uaenorth
          fi

      - name: Deploy Agent Engine to UAE
        run: |
          APP_EXISTS=$(az containerapp list -g $AZURE_RG --query "[?name=='ca-agent-engine'].name" -o tsv)
          if [ -z "$APP_EXISTS" ]; then
            echo "Creating new Agent Engine in UAE..."
            az containerapp create \
              -g $AZURE_RG -n ca-agent-engine \
              --environment managed-env-uae \
              --image $ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG \
              --ingress external --target-port 8000 \
              --cpu 1.0 --memory 2.0Gi
          else
            echo "Updating existing Agent Engine..."
            az containerapp update \
              -g $AZURE_RG -n ca-agent-engine \
              --image $ACR_LOGIN_SERVER/agent-engine:$IMAGE_TAG
          fi

  deploy-frontend:
    name: Deploy (Frontend)
    needs: build-frontend
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: ${{ secrets.AZURE_RG || 'rg-agentic-saas' }}
    steps:
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Deploy Frontend to Azure Container Apps
        run: |
          az containerapp update -g $AZURE_RG -n ca-frontend --image $ACR_LOGIN_SERVER/frontend:$IMAGE_TAG