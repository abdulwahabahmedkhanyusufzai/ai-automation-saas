name: AI SaaS CD Pipeline

on:
  push:
    branches: [ master ]

permissions:
  id-token: write
  contents: read

jobs:
  # --- BUILD JOBS ---
  build-orchestrator:
    name: Build (Orchestrator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          TAG=${{ secrets.ACR_NAME }}.azurecr.io/orchestrator:${{ github.sha }}
          docker build -t $TAG -f deployments/docker/Dockerfile.orchestrator .
          docker push $TAG

  build-agent-engine:
    name: Build (Agent Engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          TAG=${{ secrets.ACR_NAME }}.azurecr.io/agent-engine:${{ github.sha }}
          docker build -t $TAG -f deployments/docker/Dockerfile.agent .
          docker push $TAG

  build-frontend:
    name: Build (Frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - run: |
          az acr login --name ${{ secrets.ACR_NAME }}
          TAG=${{ secrets.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
          docker build \
            --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GITHUB_CLIENT_ID }} \
            -t $TAG -f deployments/docker/Dockerfile.frontend apps/frontend
          docker push $TAG

  # --- DEPLOYMENT JOB ---
  deploy-all-to-uae:
    name: Deploy to UAE
    needs: [build-orchestrator, build-agent-engine, build-frontend]
    runs-on: ubuntu-latest
    env:
      ACR_LOGIN_SERVER: ${{ secrets.ACR_NAME }}.azurecr.io
      IMAGE_TAG: ${{ github.sha }}
      AZURE_RG: 'rg-agentic-saas'
      ENV_NAME: 'managed-env-uae'
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure Container Apps extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Ensure UAE Environment exists
        run: |
          az containerapp env show -n ${{ env.ENV_NAME }} -g ${{ env.AZURE_RG }} || \
          az containerapp env create -n ${{ env.ENV_NAME }} -g ${{ env.AZURE_RG }} -l uaenorth

      - name: Deploy All Apps
        run: |
          # Fetch ACR Password once to use for all three apps
          ACR_PASS=$(az acr credential show -n ${{ secrets.ACR_NAME }} --query "passwords[0].value" -o tsv)
          
          echo "Deploying ca-orchestrator..."
          az containerapp create -g ${{ env.AZURE_RG }} -n ca-orchestrator \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/orchestrator:${{ env.IMAGE_TAG }} \
            --ingress external --target-port 8080 --cpu 0.5 --memory 1.0Gi \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_NAME }} \
            --registry-password $ACR_PASS

          echo "Deploying ca-agent-engine..."
          az containerapp create -g ${{ env.AZURE_RG }} -n ca-agent-engine \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/agent-engine:${{ env.IMAGE_TAG }} \
            --ingress external --target-port 8000 --cpu 1.0 --memory 2.0Gi \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_NAME }} \
            --registry-password $ACR_PASS

          echo "Deploying ca-frontend..."
          az containerapp create -g ${{ env.AZURE_RG }} -n ca-frontend \
            --environment ${{ env.ENV_NAME }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/frontend:${{ env.IMAGE_TAG }} \
            --ingress external --target-port 3000 --cpu 0.5 --memory 1.0Gi \
            --registry-server ${{ env.ACR_LOGIN_SERVER }} \
            --registry-username ${{ secrets.ACR_NAME }} \
            --registry-password $ACR_PASS